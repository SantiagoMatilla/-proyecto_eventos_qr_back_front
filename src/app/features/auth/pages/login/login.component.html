<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="ejemplo@correo.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">El email es obligatorio</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Formato de email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
        </mat-form-field>

        <div class="error-msg" *ngIf="errorMensaje">{{ errorMensaje }}</div>

        <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="loginForm.invalid">
          Entrar
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions class="card-footer">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </mat-card-actions>
  </mat-card>
</div>
